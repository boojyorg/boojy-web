<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>Boojy</title>
    <link rel="stylesheet" href="/css/shared.css?v=5">
    <style>
        .logo-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        .logo-page-glow {
            --glow-opacity: 0.75;
            --glow-width: 1400px;
            --glow-height: 994px;
            --glow-color: 196, 197, 255;

            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: var(--glow-width);
            height: var(--glow-height);
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
            opacity: var(--glow-opacity);
            background: radial-gradient(ellipse,
                rgba(var(--glow-color), 0.25) 0%,
                rgba(var(--glow-color), 0.12) 40%,
                transparent 70%);
            view-transition-name: hero-glow;
        }

        .logo-page-logo {
            position: relative;
            z-index: 2;
            height: 7.5rem;
            width: auto;
        }
    </style>
</head>
<body>
    <section class="logo-page">
        <div class="logo-page-glow" aria-hidden="true"></div>
        <img src="/images/boojy-logo.svg" alt="Boojy" class="logo-page-logo">
    </section>

    <script src="/js/starfield.js?v=5"></script>
    <script src="/js/shared.js?v=5"></script>
    <script src="/js/dev-tools.js?v=5"></script>
</body>
</html>
